<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <div class="headin">
            <div>
                <h2>Weather App</h2>
            </div>

            <div class="search-here">
                <input type="text" id="search-bar" placeholder="Enter City Name">
                <img id="btn" src="https://www.graphicsfuel.com/wp-content/uploads/2011/12/magnifying-glass-search-icon.jpg">
            </div>
        </div>

        <div class="weather-img">
            <img id="weather-image" src="./hot weather.avif" alt="Weather Image">
            <h1 class="cityName"><u>City</u></h1>

            <div class="temptogether">
                <h3 class="temp">Temperature</h3>
                <p>_</p>
            </div>
        </div>

        <div class="weather-details">
            <div>
                <h3 class="humidity">Humidity</h3>
                <p>_</p>
            </div>

            <div>
                <h3 class="wind">Wind</h3>
                <p>_</p>
            </div>

            <div>
                <h3 class="precipitation">Precipitation</h3>
                <p>_</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
